    <script>

            },
            "about.p2": {
                en: "Before my PhD I worked as a Research Associate at the PL Lab of Peking University and as a DevOps Engineer at IBM, where I built CI/CD and cloud infrastructure for a core banking system for the National Bank of Greece.",
                zh: "在攻读博士学位之前，我曾在北京大学程序设计语言实验室担任研究助理，并在 IBM 担任 DevOps 工程师，为希腊国家银行的核心银行系统构建了 CI/CD 流水线与云基础设施。"
            },

            "research.heading": { en: "Research Interests", zh: "研究兴趣" },

            "pub.heading": { en: "Publications", zh: "论文发表" },
            "pub.scholar": { en: "Full list on Google Scholar", zh: "完整列表见 Google Scholar" },

            "honors.heading": { en: "Selected Honors & Awards", zh: "荣誉与奖项（精选）" },

            "footer.email":     { en: "Email",     zh: "邮箱" },
            "footer.based":     { en: "Based in",  zh: "所在地" },
            "footer.location":  { en: "Beijing, China &middot; Shanghai (from June 2026)", zh: "中国北京 &middot; 上海（2026 年 6 月起）" },
            "footer.elsewhere": { en: "Elsewhere", zh: "其他链接" },
            "footer.rights":    { en: "All rights reserved.", zh: "保留所有权利。" }
        };

        // ---- Research interests. Translatable fields use { en, zh }. ----
        const researchInterests = [
            {
                icon: "fas fa-code",
                title: { en: "LLM-Based Program Analysis", zh: "基于大模型的程序分析" },
                desc:  { en: "Using large language models to reason about program correctness and behaviour.",
                         zh: "利用大语言模型推理程序的正确性与行为。" }
            },
            {
                icon: "fas fa-robot",
                title: { en: "Coding Agents & Agent Design", zh: "编程智能体与智能体设计" },
                desc:  { en: "Designing reliable, secure agents — including prompt-injection-resistant coding agents and agents for AI kernels.",
                         zh: "设计可靠、安全的智能体，包括抗提示注入的编程智能体以及面向 AI 算子的智能体。" }
            },
            {
                icon: "fas fa-bug",
                title: { en: "Symbolic Execution", zh: "符号执行" },
                desc:  { en: "Combining symbolic/concolic execution with LLMs to defuse logic bombs and explore programs.",
                         zh: "将符号 / 混合执行与大语言模型结合，拆除逻辑炸弹并探索程序。" }
            },
            {
                icon: "fas fa-shield-alt",
                title: { en: "Software Verification", zh: "软件验证" },
                desc:  { en: "Verification-aware LLMs and AI-assisted verification of smart contracts.",
                         zh: "面向验证的大语言模型，以及 AI 辅助的智能合约验证。" }
            }
        ];

        // ---- Publications (newest first). Titles stay in English (standard for papers).
        //      Add a `link` field to make a title clickable. ----
        const publications = [
            {
                venue: "ICSE 2026",
                title: "HoarePrompt: Structural Reasoning About Program Correctness in Natural Language",
                link: "https://arxiv.org/abs/2503.19599",
                award: { en: "ACM SIGSOFT Distinguished Paper Award", zh: "ACM SIGSOFT 杰出论文奖" }
            },
            {
                venue: "ISSTA 2026",
                title: "Gordian: Defusing Logic Bombs in Symbolic Execution with LLM-Generated Ghost Code",
                link: "https://arxiv.org/abs/2602.19128"
            },
            {
                venue: "LLM4Code @ ICSE 2026",
                title: "Statistical Independence Aware Caching for LLM Workflows",
                link: "https://arxiv.org/abs/2511.22118"
            },
            {
                venue: "LMPL Workshop",
                title: "Authority Is Not a String: A Capability-Scoped Harness for Prompt-Injection-Resistant Coding Agents",
                status: { en: "Under submission", zh: "投稿中" }
            },
            {
                venue: "SSBSE 2025",
                title: "Optimised Fitness Functions for Automated Improvement of Software's Execution Time",
                link: "https://solar.cs.ucl.ac.uk/pdf/bouras_2025_ssbse.pdf"
            },
            {
                venue: "GI @ ICSE 2025",
                title: "LLM-Assisted Crossover in Genetic Improvement of Software",
                link: "https://gpbib.cs.ucl.ac.uk/gi2025/bouras_2025_GI.pdf",
                award: { en: "Best Presentation Award", zh: "最佳报告奖" }
            },
            {
                venue: "SAMOS XXIII",
                title: "Reliable Basic Block Energy Accounting",
                link: "https://dl.acm.org/doi/10.1007/978-3-031-46077-7_13"
            }
        ];

        // ---- Honors (most relevant first). ----
        const honors = [
            { year: "2026", text: { en: "ACM SIGSOFT Distinguished Paper Award, ICSE 2026",
                                    zh: "ACM SIGSOFT 杰出论文奖，ICSE 2026" } },
            { year: "2025", text: { en: "NSFC Research Fund for Excellent International PhD Students — Principal Investigator on verification-aware LLMs, symbolic execution and smart contract verification",
                                    zh: "国家自然科学基金（NSFC）外国学者研究基金优秀博士生项目——作为负责人，研究面向验证的大语言模型、符号执行与智能合约验证" } },
            { year: "2025", text: { en: "International Computer Science Excellent PhD Student Scholarship, Peking University",
                                    zh: "北京大学国际计算机科学优秀博士生奖学金" } },
            { year: "2025", text: { en: "Chinese Government Scholarship for PhD studies at Peking University",
                                    zh: "中国政府奖学金（北京大学博士研究生）" } },
            { year: "2024", text: { en: "Ranked 1st — UCL Software Systems Engineering MSc, Class of 2024",
                                    zh: "UCL 软件系统工程硕士 2024 届第一名" } },
            { year: "2023", text: { en: "Eugenides Foundation & HELLENiQ ENERGY scholarships for postgraduate studies",
                                    zh: "Eugenides 基金会与 HELLENiQ ENERGY 研究生奖学金" } }
        ];

        // ---- CV files per language ----
        const cvFiles = { en: "CV.pdf", zh: "CV_Bouras_Ch.pdf" };

        // ===================== Rendering & language switching =====================
        const esc = s => String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));
        const pick = (field, lang) => (field && typeof field === "object" && "en" in field) ? field[lang] : field;

        function renderLists(lang) {
            document.getElementById("research-grid").innerHTML = researchInterests.map(r => `
                <div class="bg-white border border-gray-200 rounded-xl p-5 hover:shadow-md hover:border-brand transition">
                    <div class="text-brand-dark text-xl mb-3"><i class="${esc(r.icon)}"></i></div>
                    <h3 class="font-semibold text-gray-900 mb-1">${esc(pick(r.title, lang))}</h3>
                    <p class="text-sm text-gray-600 leading-relaxed">${esc(pick(r.desc, lang))}</p>
                </div>
            `).join("");

            document.getElementById("publications-list").innerHTML = publications.map(p => {
                const title = p.link
                    ? `<a href="${esc(p.link)}" target="_blank" rel="noopener" class="hover:text-brand-darker hover:underline">${esc(p.title)}</a>`
                    : esc(p.title);
                const award = p.award
                    ? `<span class="inline-block mt-1 text-xs font-semibold text-brand-darker bg-brand-light rounded-full px-2.5 py-0.5"><i class="fas fa-award mr-1"></i>${esc(pick(p.award, lang))}</span>`
                    : "";
                const status = p.status
                    ? `<span class="inline-block mt-1 text-xs font-semibold text-gray-600 bg-gray-100 rounded-full px-2.5 py-0.5">${esc(pick(p.status, lang))}</span>`
                    : "";
                return `
                    <li class="flex flex-col sm:flex-row gap-2 sm:gap-5">
                        <span class="flex-shrink-0 sm:w-44 text-sm font-semibold text-brand-dark pt-0.5">${esc(p.venue)}</span>
                        <div>
                            <p class="text-gray-900 font-medium leading-snug">${title}</p>
                            <div class="flex flex-wrap gap-2">${award}${status}</div>
                        </div>
                    </li>`;
            }).join("");

            document.getElementById("honors-list").innerHTML = honors.map(h => `
                <li class="flex gap-4">
                    <span class="flex-shrink-0 w-14 text-sm font-bold text-brand-dark pt-0.5">${esc(h.year)}</span>
                    <span class="text-gray-700">${esc(pick(h.text, lang))}</span>
                </li>
            `).join("");
        }

        function setLang(lang) {
            if (lang !== "zh") lang = "en";
            document.documentElement.setAttribute("lang", lang);
            // Static strings
            document.querySelectorAll("[data-i18n]").forEach(el => {
                const entry = i18n[el.getAttribute("data-i18n")];
                if (entry) el.innerHTML = entry[lang];
            });
            // CV links point to the matching language PDF
            const cv = cvFiles[lang];
            document.getElementById("cv-nav").setAttribute("href", cv);
            document.getElementById("cv-primary").setAttribute("href", cv);
            // Data-driven lists
            renderLists(lang);
            try { localStorage.setItem("lang", lang); } catch (e) {}
        }

        // Init
        let initial = "en";
        try { if (localStorage.getItem("lang") === "zh") initial = "zh"; } catch (e) {}
        setLang(initial);

        document.getElementById("lang-toggle").addEventListener("click", () => {
            setLang(document.documentElement.getAttribute("lang") === "zh" ? "en" : "zh");
        });

        // ---- WeChat QR popup ----
        const wechatModal = document.getElementById("wechat-modal");
        const openWechat  = () => { wechatModal.classList.remove("hidden"); document.body.style.overflow = "hidden"; };
        const closeWechat = () => { wechatModal.classList.add("hidden"); document.body.style.overflow = ""; };
        document.getElementById("wechat-btn").addEventListener("click", openWechat);
        document.getElementById("wechat-close").addEventListener("click", closeWechat);
        document.getElementById("wechat-overlay").addEventListener("click", closeWechat);
        document.addEventListener("keydown", e => { if (e.key === "Escape") closeWechat(); });

        document.getElementById("year").textContent = new Date().getFullYear();
    </script>
</body>
</html>
