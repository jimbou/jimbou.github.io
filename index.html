    <style>
        :root {
            color-scheme: light;
            --paper: #f8f6f1;
            --paper-deep: #eeece5;
            --surface: #fffefa;
            --ink: #20272b;
            --ink-soft: #596369;
            --muted: #7c8589;
            --line: #dcdedb;
            --brand: #5f8792;
            --brand-deep: #345d69;
            --brand-wash: #e5eef0;
            --amber: #a86124;
            --amber-wash: #f7eadc;
            --serif: "Newsreader", Iowan Old Style, Georgia, serif;
            --sans: "Source Sans 3", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --mono: "DM Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            --shell: 1120px;
            --radius: 16px;
            --shadow: 0 24px 60px rgba(38, 51, 55, 0.09);
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; scroll-padding-top: 82px; }
        body {
            margin: 0;
            color: var(--ink);
            background: var(--paper);
            font-family: var(--sans);
            font-size: 17px;
            line-height: 1.62;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }
        a, button { -webkit-tap-highlight-color: transparent; }
        a:focus-visible, button:focus-visible { outline: 3px solid var(--amber); outline-offset: 4px; }
        h1, h2 { font-family: var(--serif); font-weight: 500; letter-spacing: -0.045em; }
        .site-shell { width: min(calc(100% - 48px), var(--shell)); margin-inline: auto; }
        .section-anchor { scroll-margin-top: 5rem; }
        [data-lang] { display: none; }
        html[lang="en"] [data-lang="en"],
        html[lang="zh"] [data-lang="zh"] { display: inline; }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 30;
            border-bottom: 1px solid color-mix(in srgb, var(--line) 88%, transparent);
            background: color-mix(in srgb, var(--paper) 90%, transparent);
            backdrop-filter: blur(16px) saturate(1.2);
        }
        .nav-shell { min-height: 68px; display: flex; align-items: center; gap: 28px; }
        .wordmark { display: inline-flex; align-items: baseline; gap: 2px; color: var(--ink); font-family: var(--serif); font-size: 1.42rem; font-weight: 600; letter-spacing: -0.035em; text-decoration: none; }
        .wordmark-dot { color: var(--amber); }
        .desktop-nav { display: flex; align-items: center; gap: clamp(18px, 2.4vw, 30px); margin-left: auto; }
        .desktop-nav a, .mobile-nav a { color: var(--ink-soft); font-size: .88rem; font-weight: 600; text-decoration: none; }
        .desktop-nav a:hover, .mobile-nav a:hover { color: var(--brand-deep); }
        .nav-actions { display: flex; align-items: center; gap: 9px; }
        .nav-control, .nav-cv, .nav-toggle {
            min-height: 37px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: color-mix(in srgb, var(--surface) 80%, transparent);
            color: var(--ink-soft);
            font: 700 .8rem/1 var(--sans);
        }
        .nav-control, .nav-toggle { padding: 0 13px; cursor: pointer; }
        .nav-cv { display: inline-flex; align-items: center; padding: 0 15px; color: #fff; border-color: var(--brand-deep); background: var(--brand-deep); text-decoration: none; }
        .nav-control:hover, .nav-toggle:hover { color: var(--brand-deep); border-color: var(--brand); }
        .nav-cv:hover { background: #284d57; }
        .nav-toggle { display: none; width: 39px; padding: 0; }
        .mobile-nav { border-top: 1px solid var(--line); background: var(--surface); }
        .mobile-nav-inner { width: min(calc(100% - 48px), var(--shell)); margin: 0 auto; padding: 12px 0 17px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .mobile-nav a { padding: 5px 0; text-align: center; }

        .hero { position: relative; overflow: hidden; padding: clamp(64px, 8vw, 108px) 0 clamp(70px, 9vw, 118px); }
        .hero::before {
            position: absolute;
            inset: 0;
            z-index: -1;
            content: "";
            background:
                radial-gradient(50% 70% at 88% 0%, color-mix(in srgb, var(--brand-wash) 86%, transparent), transparent 72%),
                radial-gradient(35% 55% at 3% 100%, color-mix(in srgb, var(--amber-wash) 58%, transparent), transparent 74%);
        }
        .hero-grid { display: grid; grid-template-columns: 315px minmax(0, 1fr); align-items: center; gap: clamp(52px, 8vw, 104px); }
        .portrait-wrap { position: relative; margin: 0; }
        .portrait-wrap::before { position: absolute; inset: 18px -18px -18px 18px; content: ""; border: 1px solid var(--brand); border-radius: 46% 46% 45% 45%; opacity: .45; }
        .portrait-wrap::after { position: absolute; right: -20px; bottom: -23px; width: 72px; height: 72px; content: ""; border-radius: 50%; background: var(--amber-wash); }
        .portrait-wrap img { position: relative; z-index: 1; display: block; width: 100%; aspect-ratio: 1; border: 8px solid var(--surface); border-radius: 46% 46% 45% 45%; object-fit: cover; box-shadow: var(--shadow); }
        .eyebrow, .section-kicker {
            margin: 0 0 14px;
            color: var(--brand-deep);
            font: 700 .72rem/1.2 var(--sans);
            letter-spacing: .14em;
            text-transform: uppercase;
        }
        .hero-copy h1 { margin: 0 0 10px; font-size: clamp(3.3rem, 6.2vw, 5.6rem); line-height: .93; }
        .hero-subtitle { margin: 0 0 25px; color: var(--brand-deep); font-size: 1.06rem; font-weight: 700; }
        .hero-body { max-width: 670px; margin: 0 0 16px; color: var(--ink-soft); line-height: 1.66; }
        .hero-status { max-width: 670px; margin: 22px 0 28px; padding: 14px 17px; color: var(--ink-soft); border-left: 3px solid var(--amber); background: color-mix(in srgb, var(--amber-wash) 60%, transparent); font-size: .94rem; }
        .hero-actions { display: flex; flex-wrap: wrap; gap: 9px; }
        .action {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 42px;
            padding: 0 15px;
            color: var(--ink-soft);
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            font-size: .87rem;
            font-weight: 700;
            text-decoration: none;
            transition: transform 150ms ease, border-color 150ms ease, color 150ms ease;
        }
        button.action { cursor: pointer; }
        .action:hover { color: var(--brand-deep); border-color: var(--brand); transform: translateY(-1px); }
        .action-primary { color: #fff; border-color: var(--brand-deep); background: var(--brand-deep); }
        .action-primary:hover { color: #fff; background: #284d57; }

        .site-section { padding: clamp(70px, 9vw, 108px) 0; border-top: 1px solid var(--line); }
        .section-tint { background: color-mix(in srgb, var(--surface) 58%, var(--paper)); }
        .narrow-shell { max-width: 850px; }
        .section-heading { display: flex; align-items: end; justify-content: space-between; gap: 32px; margin-bottom: 38px; }
        .section-heading h2 { margin: 0; font-size: clamp(2.35rem, 4.5vw, 3.55rem); line-height: 1.02; }
        .section-heading > a { flex: 0 0 auto; color: var(--brand-deep); font-size: .86rem; font-weight: 700; text-decoration: none; }
        .section-heading > a:hover { text-decoration: underline; text-underline-offset: 4px; }
        .about-copy { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(30px, 6vw, 70px); color: var(--ink-soft); }
        .about-copy p { margin: 0; }

        .research-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .research-card { position: relative; min-height: 215px; padding: 26px; overflow: hidden; border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); transition: border-color 160ms ease, transform 160ms ease, box-shadow 160ms ease; }
        .research-card:hover { border-color: var(--brand); transform: translateY(-2px); box-shadow: 0 14px 35px rgba(38, 51, 55, .07); }
        .research-card-index { display: block; margin-bottom: 42px; color: var(--amber); font: 500 .7rem/1 var(--mono); }
        .research-card-icon { position: absolute; top: 24px; right: 25px; color: var(--brand); font-size: 1.05rem; }
        .research-card h3 { margin: 0 0 8px; font-size: 1.12rem; }
        .research-card p { margin: 0; color: var(--ink-soft); font-size: .91rem; line-height: 1.5; }

        .publication-list { margin: 0; padding: 0; border-top: 1px solid var(--line); list-style: none; }
        .publication-row { display: grid; grid-template-columns: 155px minmax(0, 1fr); gap: 28px; padding: 25px 0 27px; border-bottom: 1px solid var(--line); }
        .publication-venue { color: var(--brand-deep); font: 700 .75rem/1.45 var(--sans); letter-spacing: .08em; text-transform: uppercase; }
        .publication-title { margin: 0; color: var(--ink); font-family: var(--serif); font-size: clamp(1.2rem, 2.2vw, 1.52rem); font-weight: 500; letter-spacing: -.025em; line-height: 1.25; }
        .publication-title-link { color: inherit; text-decoration-color: color-mix(in srgb, var(--brand) 45%, transparent); text-decoration-thickness: 1px; text-underline-offset: 4px; }
        .publication-title-link:hover { color: var(--brand-deep); text-decoration-thickness: 2px; }
        .publication-meta { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 11px; }
        .publication-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 9px; border-radius: 999px; background: var(--brand-wash); color: var(--brand-deep); font-size: .72rem; font-weight: 700; }
        .publication-badge.status { background: var(--paper-deep); color: var(--ink-soft); }
        .publication-actions { display: flex; flex-wrap: wrap; gap: 18px; margin-top: 15px; }
        .publication-link { color: var(--brand-deep); font-size: .79rem; font-weight: 700; text-decoration: none; }
        .publication-link:hover { color: var(--amber); }

        .honors-list { margin: 0; padding: 0; border-top: 1px solid var(--line); list-style: none; }
        .honor-row { display: grid; grid-template-columns: 75px minmax(0, 1fr); gap: 25px; padding: 18px 0; border-bottom: 1px solid var(--line); }
        .honor-year { color: var(--amber); font: 500 .76rem/1.7 var(--mono); }
        .honor-text { color: var(--ink-soft); }

        .site-footer { color: #c7d0d2; background: #1f2b2f; }
        .footer-shell { padding: 62px 0 30px; }
        .footer-grid { display: grid; grid-template-columns: 1.3fr .8fr .7fr; gap: 50px; }
        .footer-label { margin: 0 0 11px; color: #fff; font-size: .78rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
        .site-footer a { color: inherit; text-decoration: none; }
        .site-footer a:hover { color: #fff; }
        .footer-socials { display: flex; gap: 19px; font-size: 1.1rem; }
        .footer-bottom { margin-top: 46px; padding-top: 22px; border-top: 1px solid rgba(255,255,255,.13); color: #849397; font-size: .78rem; }

        .wechat-card { position: relative; width: min(100%, 320px); padding: 28px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow); text-align: center; }
        .wechat-card h3 { margin: 0 0 3px; font-family: var(--serif); font-size: 1.45rem; }
        .wechat-card p { margin: 0 0 17px; color: var(--muted); font-size: .85rem; }
        .wechat-close { position: absolute; top: 11px; right: 11px; display: grid; place-items: center; width: 32px; height: 32px; border: 0; border-radius: 50%; background: transparent; color: var(--muted); cursor: pointer; }
        .wechat-close:hover { color: var(--ink); background: var(--paper-deep); }

        @media (max-width: 860px) {
            .desktop-nav { display: none; }
            .nav-actions { margin-left: auto; }
            .nav-toggle { display: inline-grid; place-items: center; }
            .hero-grid { grid-template-columns: 235px minmax(0, 1fr); gap: 48px; }
            .hero-copy h1 { font-size: clamp(3rem, 8vw, 4.5rem); }
            .about-copy { grid-template-columns: 1fr; gap: 20px; }
        }

        @media (min-width: 861px) {
            .mobile-nav { display: none !important; }
        }

        @media (max-width: 680px) {
            body { font-size: 16px; }
            .site-shell, .mobile-nav-inner { width: min(calc(100% - 36px), var(--shell)); }
            .wordmark { font-size: 1.25rem; }
            .nav-control { padding-inline: 10px; }
            .mobile-nav-inner { grid-template-columns: repeat(2, 1fr); }
            .mobile-nav a { text-align: left; }
            .hero { padding-top: 46px; }
            .hero-grid { grid-template-columns: 1fr; gap: 48px; }
            .portrait-wrap { width: min(72vw, 285px); margin-inline: auto; }
            .hero-copy { text-align: left; }
            .hero-copy h1 { font-size: clamp(3.15rem, 16vw, 4.7rem); }
            .section-heading { align-items: flex-start; flex-direction: column; gap: 13px; margin-bottom: 30px; }
            .research-grid { grid-template-columns: 1fr; }
            .research-card { min-height: 0; }
            .publication-row { grid-template-columns: 1fr; gap: 8px; }
            .publication-venue { padding-top: 0; }
            .footer-grid { grid-template-columns: 1fr; gap: 30px; }
            .footer-bottom { margin-top: 35px; }
        }

        @media (prefers-reduced-motion: reduce) {
            html { scroll-behavior: auto; }
            *, *::before, *::after { scroll-behavior: auto !important; transition-duration: .01ms !important; }
        }
    </style>
</head>

        const esc = s => String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));

                    <h3>${esc(pick(r.title, lang))}</h3>
                    <p>${esc(pick(r.desc, lang))}</p>
                </article>
            `).join("");

            document.getElementById("publications-list").innerHTML = publications.map(p => {
                const title = p.link
                    ? `<a href="${esc(p.link)}" target="_blank" rel="noopener" class="publication-title-link">${esc(p.title)}</a>`
                    : esc(p.title);
                const award = p.award
                    ? `<span class="publication-badge"><i class="fas fa-award" aria-hidden="true"></i>${esc(pick(p.award, lang))}</span>`
                    : "";

                    : "";
                const actions = [
                    p.project
                        ? `<a href="${esc(p.project)}" target="_blank" rel="noopener" class="publication-link"><span data-i18n="pub.project">${esc(pick(i18n["pub.project"], lang))}</span> <span aria-hidden="true">↗</span></a>`

                    p.link
                        ? `<a href="${esc(p.link)}" target="_blank" rel="noopener" class="publication-link">${esc(pick(i18n["pub.paper"], lang))} <span aria-hidden="true">↗</span></a>`
                        : ""
                ].filter(Boolean).join("");
                return `
                    <li class="publication-row">
                            <span class="publication-venue">${esc(p.venue)}</span>

                            ${(award || status) ? `<div class="publication-meta">${award}${status}</div>` : ""}
                            ${actions ? `<div class="publication-actions">${actions}</div>` : ""}

        function setLang(lang) {
            if (lang !== "zh") lang = "en";
            document.documentElement.setAttribute("lang", lang);
            // Static strings

                const entry = i18n[el.getAttribute("data-i18n")];
                if (entry) el.innerHTML = entry[lang];
            });

            const cv = cvFiles[lang];
            document.getElementById("cv-nav").setAttribute("href", cv);
            document.getElementById("cv-primary").setAttribute("href", cv);
            // Data-driven lists
            renderLists(lang);
            try { localStorage.setItem("lang", lang); } catch (e) {}
        }

        let initial = "en";
        try { if (localStorage.getItem("lang") === "zh") initial = "zh"; } catch (e) {}

            setLang(document.documentElement.getAttribute("lang") === "zh" ? "en" : "zh");

        const closeMobileNav = () => {
            mobileNav.classList.add("hidden");
            navToggle.setAttribute("aria-expanded", "false");
        };
        navToggle.addEventListener("click", () => {
            const willOpen = mobileNav.classList.contains("hidden");
            mobileNav.classList.toggle("hidden", !willOpen);
            navToggle.setAttribute("aria-expanded", String(willOpen));
        });
        mobileNav.querySelectorAll("a").forEach(link => link.addEventListener("click", closeMobileNav));
        window.addEventListener("resize", () => {
            if (window.innerWidth > 860) closeMobileNav();
        });

        const wechatModal = document.getElementById("wechat-modal");

        document.getElementById("wechat-btn").addEventListener("click", openWechat);
        document.getElementById("wechat-close").addEventListener("click", closeWechat);
        document.getElementById("wechat-overlay").addEventListener("click", closeWechat);
        document.addEventListener("keydown", e => { if (e.key === "Escape") closeWechat(); });
